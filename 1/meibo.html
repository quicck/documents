        :root {
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-main: #1d1d1f;
            --text-sub: #48484a;
            --accent-blue: #007aff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 20px;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
            max-width: 1200px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 10px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 1400px;
        }

        .class-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            transition: transform 0.3s ease;
        }

        .class-header {
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            padding-bottom: 12px;
            margin-bottom: 15px;
        }

        .class-name {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent-blue);
        }

        .class-info {
            font-size: 0.85rem;
            color: var(--text-sub);
            line-height: 1.4;
        }

        .class-info span {
            font-weight: 600;
            color: var(--text-main);
        }

        .student-list {
            list-style: none;
            display: grid;
            grid-template-columns: 1fr;
            gap: 6px;
        }

        .student-item {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding: 4px 8px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            font-size: 0.95rem;
        }

        .student-no {
            font-weight: 600;
            width: 30px;
            color: var(--text-sub);
            font-size: 0.8rem;
        }

        .student-name {
            flex-grow: 1;
        }

        @media (max-width: 600px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
